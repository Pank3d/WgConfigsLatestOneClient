name: Deploy Application

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          YOOKASSA_SHOP_ID: ${{ secrets.YOOKASSA_SHOP_ID }}
          YOOKASSA_SECRET_KEY: ${{ secrets.YOOKASSA_SECRET_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: BOT_TOKEN,CHANNEL_ID,WEBHOOK_URL,WEBHOOK_SECRET,YOOKASSA_SHOP_ID,YOOKASSA_SECRET_KEY,DB_PASSWORD
          script: |
            set -e

            # Установка Docker если нет
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi

            # Установка Docker Compose plugin если нет
            if ! docker compose version &> /dev/null; then
              apt-get update && apt-get install -y docker-compose-plugin
            fi

            # Установка nginx и certbot если нет
            if ! command -v nginx &> /dev/null; then
              apt-get update && apt-get install -y nginx
            fi
            if ! command -v certbot &> /dev/null; then
              apt-get update && apt-get install -y certbot python3-certbot-nginx
            fi

            # Клонирование или обновление репозитория
            if [ ! -d /root/WgConfigsLatestOneClient/.git ]; then
              git clone https://github.com/${{ github.repository }}.git /root/WgConfigsLatestOneClient
            fi

            cd /root/WgConfigsLatestOneClient
            git pull origin master

            # Генерация backend/.env из GitHub Secrets
            cat > backend/.env <<EOF
NODE_ENV=production
PORT=3001
DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@postgres:5432/wireguard_vpn
BOT_TOKEN=${BOT_TOKEN}
CHANNEL_ID=${CHANNEL_ID}
WIREGUARD_API_URL=http://wireguard-api:500
WEBHOOK_URL=${WEBHOOK_URL}
WEBHOOK_SECRET=${WEBHOOK_SECRET}
MAX_CONFIGS_PER_USER=3
YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
YOOKASSA_RETURN_URL=${WEBHOOK_URL}
EOF

            # Остановить nginx чтобы освободить порт 80
            systemctl stop nginx 2>/dev/null || true

            # Полностью остановить и удалить старые контейнеры
            docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true

            # Пересобрать и поднять контейнеры (фронтенд теперь на 8080)
            export DB_PASSWORD="${DB_PASSWORD}"
            docker compose -f docker-compose.prod.yml up -d --build --force-recreate

            # Настроить хостовый nginx как reverse proxy
            mkdir -p /var/www/certbot
            cp nginx-host.conf /etc/nginx/sites-available/wgshoppr
            ln -sf /etc/nginx/sites-available/wgshoppr /etc/nginx/sites-enabled/wgshoppr
            rm -f /etc/nginx/sites-enabled/default
            rm -f /etc/nginx/sites-enabled/wireguard-vpn

            # Запустить nginx
            nginx -t
            systemctl enable nginx
            systemctl start nginx

            # Получить SSL сертификат (только если ещё нет)
            if [ ! -d /etc/letsencrypt/live/wgshoppr.ru ]; then
              certbot --nginx -d wgshoppr.ru -d www.wgshoppr.ru --non-interactive --agree-tos -m m.zhilevsky@yandex.ru
            else
              certbot renew --quiet
            fi

            # Автообновление сертификата в cron
            if ! crontab -l 2>/dev/null | grep -q certbot; then
              (crontab -l 2>/dev/null; echo "0 3 * * * certbot renew --quiet --post-hook 'systemctl reload nginx'") | crontab -
            fi
