name: Deploy Application

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy frontend files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "frontend/dist/*"
          target: "/var/www/wireguard-vpn"
          strip_components: 2

      - name: Setup server and deploy backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Установка Node.js 20 если нет
            if ! command -v node &> /dev/null || [[ "$(node -v)" != v20* ]]; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi

            # Установка PM2 если нет
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            # Установка Nginx если нет
            if ! command -v nginx &> /dev/null; then
              apt-get update
              apt-get install -y nginx
            fi

            # Создание директорий
            mkdir -p /var/www/wireguard-vpn

            # Клонирование или обновление репозитория
            if [ ! -d /root/WgConfigsLatestOneClient/.git ]; then
              git clone https://github.com/${{ github.repository }}.git /root/WgConfigsLatestOneClient
            else
              cd /root/WgConfigsLatestOneClient
              git pull origin master
            fi

            # Backend
            cd /root/WgConfigsLatestOneClient/backend
            npm ci --production
            npx prisma generate
            npx prisma db push --skip-generate

            # Настройка Nginx (один раз)
            if [ ! -f /etc/nginx/sites-available/wireguard-vpn ]; then
              cp /root/WgConfigsLatestOneClient/nginx.conf /etc/nginx/sites-available/wireguard-vpn
              ln -sf /etc/nginx/sites-available/wireguard-vpn /etc/nginx/sites-enabled/
              rm -f /etc/nginx/sites-enabled/default
            fi

            # Перезапуск сервисов
            pm2 restart wireguard-backend || pm2 start npm --name "wireguard-backend" -- start
            pm2 save
            systemctl reload nginx
