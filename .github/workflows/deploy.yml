name: Deploy Application

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Установка Docker если нет
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi

            # Установка Docker Compose plugin если нет
            if ! docker compose version &> /dev/null; then
              apt-get update && apt-get install -y docker-compose-plugin
            fi

            # Клонирование или обновление репозитория
            if [ ! -d /root/WgConfigsLatestOneClient/.git ]; then
              git clone https://github.com/${{ github.repository }}.git /root/WgConfigsLatestOneClient
            fi

            cd /root/WgConfigsLatestOneClient
            git pull origin master

            # Остановить всё что может занимать порты
            docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true
            systemctl stop nginx 2>/dev/null || true
            systemctl disable nginx 2>/dev/null || true

            # Поднять всё
            docker compose -f docker-compose.prod.yml up -d --build
