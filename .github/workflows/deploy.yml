name: Deploy Application

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Установка Docker если нет
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi

            # Клонирование или обновление репозитория
            if [ ! -d /root/WgConfigsLatestOneClient/.git ]; then
              git clone https://github.com/${{ github.repository }}.git /root/WgConfigsLatestOneClient
            fi

            cd /root/WgConfigsLatestOneClient
            git pull origin master

            # Пересобрать и перезапустить backend + frontend (без пересоздания базы и wireguard)
            docker compose -f docker-compose.prod.yml up -d --build --no-deps backend frontend

            # Убедиться что postgres и wireguard-api запущены
            docker compose -f docker-compose.prod.yml up -d postgres wireguard-api
